<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Salud Integral - Registro Médico</title>
    <link rel="stylesheet" href="/static/paciente.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Clínica Salud Integral</h1>
            <p>Registro de Pacientes</p>
        </header>

        <form action="/guardar_paciente" method="POST" id="form-medico">
            <fieldset>
                <legend>Datos Personales</legend>
                
                <div class="form-group">
                    <label for="historia_clinica">N° de Historia Clínica:</label>
                    <input type="number" id="historia_clinica" name="historia_clinica" required>
                </div>
                <div class="form-group">
                    <label for="nombre_apellido">Nombre y Apellido:</label>
                    <input type="text" id="nombre_apellido" name="nombre_apellido" required>
                </div>
                <div class="form-group row">
                    <div class="col">
                        <label for="dni">DNI:</label>
                        <input type="text" id="dni" name="dni" required>
                    </div>
                    <div class="col">
                        <label for="fecha_nacimiento">Fecha de Nacimiento:</label>
                        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                    </div>
                    <div class="col">
                        <label for="edad">Edad:</label>
                        <input type="number" id="edad" name="edad" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="direccion">Dirección:</label>
                    <input type="text" id="direccion" name="direccion" required>
                </div>
                <div class="form-group row">
                    <div class="col">
                        <label for="telefono">Teléfono:</label>
                        <input type="tel" id="telefono" name="telefono" required>
                    </div>
                    <div class="col">
                        <label for="obra_social">Obra Social:</label>
                        <input type="text" id="obra_social" name="obra_social">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Datos Médicos</legend>

                <div class="form-group">
                    <label for="grupo_sanguineo">Grupo Sanguíneo:</label>
                    <select id="grupo_sanguineo" name="grupo_sanguineo" required>
                        <option value="">Seleccione...</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="alergias">Alergias:</label>
                    <textarea id="alergias" name="alergias" rows="2" placeholder="Describa si el paciente presenta alguna alergia..."></textarea>
                </div>
                <div class="form-group">
                    <label for="antecedentes">Antecedentes Médicos Relevantes:</label>
                    <textarea id="antecedentes" name="antecedentes" rows="4" placeholder="Enfermedades crónicas, cirugías previas, etc."></textarea>
                </div>
            </fieldset>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar Paciente</button>
                <button type="reset" class="btn btn-secondary">Limpiar Formulario</button>
            </div>
        </form>
    </div>
</body>
</html>
